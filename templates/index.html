<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dan's Email Tester</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="page-wrapper">
    <header class="site-header">
      <h1 class="site-title">Dan's Email Tester</h1>
      <p class="site-subtitle">Mailbox-level email verification</p>
    </header>

    <main class="main-content">
      <div class="verify-form">
        <div class="input-row">
          <input
            id="email-input"
            type="email"
            class="email-input"
            placeholder="Enter an email address"
            autocomplete="off"
            spellcheck="false"
          >
          <button id="verify-btn" class="verify-btn">Verify</button>
        </div>
        <div id="result-panel" class="result-panel"></div>
      </div>
    </main>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
